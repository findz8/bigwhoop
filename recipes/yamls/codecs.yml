type: dnf
repos:
  nonfree: rpmfusion
group-install:
  skip-broken: true
  exclude: 
    - PackageKit-gstreamer-plugin
  packages:
    - multimedia
replace:
  - from-repo: rpmfusion
    allow-erasing: true 
    packages:
      - old: ffmpeg-free
        new: ffmpeg 
      - old: mesa-va-drivers
        new: mesa-va-drivers-freeworld